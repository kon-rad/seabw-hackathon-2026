events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server web:3000;
    }

    upstream backend {
        server web:5001;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name aum.lol www.aum.lol;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://aum.lol$request_uri;
        }
    }

    # HTTPS — primary server
    server {
        listen 443 ssl;
        server_name aum.lol www.aum.lol;

        ssl_certificate     /etc/letsencrypt/live/aum.lol/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aum.lol/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Redirect www → apex
        if ($host = www.aum.lol) {
            return 301 https://aum.lol$request_uri;
        }

        # Flask backend API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # Required for SSE streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        # Vue frontend (everything else)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
